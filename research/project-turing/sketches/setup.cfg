[mutmut]
# Mutation testing config. Run with: cd sketches/ && mutmut run
#
# Known issue: mutmut's stats collection phase runs ALL tests in tests/ but
# the mutants/ directory doesn't have the scenarios/ dir needed by
# test_main_unit.py. To run mutmut, either:
# 1. Also copy scenarios/: add also_copy=turing/ ../scenarios/
# 2. Or temporarily mark TestResolveScenarioPath::test_relative_to_scenarios_dir
#    with @pytest.mark.skip
#
# For now, run mutation testing on specific small modules:
#   mutmut run --max-children 4
#
runner=python3 -m pytest tests/test_protocols.py tests/test_journal.py -x -q --tb=line -p no:randomly -p no:random-order
paths_to_mutate=turing/protocols.py
tests_dir=tests/
also_copy=turing/
