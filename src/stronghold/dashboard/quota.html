<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stronghold — Profile</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --stone-dark:#1a1a2e; --stone-mid:#16213e; --stone-light:#1e2d4a; --iron:#4a4a5a; --iron-light:#6b6b7b; --gold:#e2a529; --gold-dim:#c9a227; --gold-bright:#f4c430; --parchment:#f5f0e1; --blood:#8b2500; --emerald:#2d6a4f; --copper:#cd7f32; --silver:#c0c0c0; --platinum:#e5e4e2; --diamond:#b9f2ff; }
  body { background: linear-gradient(135deg, var(--stone-dark), var(--stone-mid)); color: #d4d0c8; font-family: 'JetBrains Mono', monospace; min-height: 100vh; }
  h1,h2,h3 { font-family: 'Playfair Display', Georgia, serif; color: var(--gold); }
  .sidebar { background: linear-gradient(180deg, #0d1321, #1a1a2e); border-right: 2px solid var(--iron); width: 240px; min-height: 100vh; }
  .sidebar-item { padding: 12px 20px; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; display: flex; align-items: center; gap: 10px; color: #8b8b9b; font-size: 0.85rem; text-decoration: none; }
  .sidebar-item:hover { background: rgba(226,165,41,0.08); color: var(--gold-dim); border-left-color: var(--gold-dim); }
  .sidebar-item.active { background: rgba(226,165,41,0.12); color: var(--gold); border-left-color: var(--gold); border-right: 3px solid var(--emerald-500); }
  .card { background: var(--stone-light); border: 1px solid var(--iron); border-radius: 8px; }
  .stat-value { font-size: 2rem; font-weight: 700; font-family: 'Playfair Display', serif; }
  .stat-label { font-size: 0.6rem; color: var(--iron-light); text-transform: uppercase; letter-spacing: 1px; }
  .bar { height: 18px; border-radius: 4px; transition: width 0.6s ease; }
  .bar-ok { background: linear-gradient(90deg, var(--emerald), #4ade80); }
  .bar-warn { background: linear-gradient(90deg, #b8860b, #e2a529); }
  .bar-danger { background: linear-gradient(90deg, var(--blood), #ff6b6b); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-active { background: rgba(45,106,79,0.3); color: #4ade80; }
  .badge-inactive { background: rgba(74,74,90,0.3); color: var(--iron-light); }
  .badge-paygo { background: rgba(226,165,41,0.15); color: var(--gold-dim); }
  .badge-warn { background: rgba(226,165,41,0.2); color: var(--gold); font-weight: 600; }
  .badge-danger { background: rgba(139,37,0,0.3); color: #ff6b6b; font-weight: 600; }
  .badge-copper { background: rgba(205,127,50,0.2); color: var(--copper); }
  .badge-silver { background: rgba(192,192,192,0.15); color: var(--silver); }
  .badge-gold { background: rgba(226,165,41,0.2); color: var(--gold); }
  .badge-platinum { background: rgba(229,228,226,0.15); color: var(--platinum); }
  .badge-diamond { background: rgba(185,242,255,0.15); color: var(--diamond); }
  .tab-bar { display: flex; gap: 0; border-bottom: 2px solid var(--iron); }
  .tab-btn { padding: 10px 16px; cursor: pointer; color: var(--iron-light); font-size: 0.75rem; border: none; background: none; transition: all 0.2s; border-bottom: 2px solid transparent; margin-bottom: -2px; font-family: inherit; }
  .tab-btn:hover { color: var(--gold-dim); }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
  .tab-panel { display: none; } .tab-panel.active { display: block; }
  .range-pills { display: flex; gap: 4px; }
  .range-pill { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; border: 1px solid var(--iron); background: none; color: var(--iron-light); cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .range-pill:hover { border-color: var(--gold-dim); color: var(--gold-dim); }
  .range-pill.active { background: rgba(226,165,41,0.15); border-color: var(--gold); color: var(--gold); }
  /* Wallet cards */
  .wallet-card { border-left: 3px solid var(--iron); transition: border-color 0.2s; }
  .wallet-card:hover { border-left-color: var(--gold-dim); }
  .wallet-bar-bg { background: rgba(74,74,90,0.3); border-radius: 4px; height: 14px; overflow: hidden; position: relative; }
  .wallet-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
  .wallet-bar-soft { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--gold); opacity: 0.6; }
  /* Chat */
  .chat-input { background: var(--stone-dark); border: 1px solid var(--iron); color: var(--parchment); border-radius: 6px; padding: 10px 14px; font-family: inherit; font-size: 0.82rem; width: 100%; resize: none; }
  .chat-input:focus { outline: none; border-color: var(--gold-dim); box-shadow: 0 0 0 2px rgba(226,165,41,0.1); }
  .chat-send { background: linear-gradient(135deg, var(--gold-dim), var(--gold)); color: var(--stone-dark); border: none; border-radius: 6px; padding: 10px 20px; font-weight: bold; cursor: pointer; font-size: 0.8rem; font-family: inherit; }
  .chat-send:hover { filter: brightness(1.1); } .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }
  .chat-msg { padding: 12px 14px; border-radius: 6px; font-size: 0.78rem; line-height: 1.6; }
  .chat-msg-user { background: rgba(226,165,41,0.06); border-left: 3px solid var(--gold-dim); }
  .chat-msg-ai { background: rgba(45,106,79,0.06); border-left: 3px solid var(--emerald); }
  .chat-msg-ai p { margin: 0 0 8px 0; } .chat-msg-ai ul { margin: 4px 0; padding-left: 20px; }
  .chat-msg-ai strong { color: var(--gold); } .chat-msg-ai em { color: var(--parchment); }
  .chat-msg-ai code { background: rgba(0,0,0,0.3); padding: 1px 4px; border-radius: 3px; font-size: 0.75rem; }
  .followup-btn { font-size: 0.7rem; padding: 4px 10px; border-radius: 4px; border: 1px solid var(--iron); background: none; color: var(--iron-light); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .followup-btn:hover { border-color: var(--gold-dim); color: var(--gold-dim); }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--iron); border-radius: 3px; }
  .mobile-menu-btn { display: none; }
  @media (max-width: 768px) {
    body { display: block; }
    .sidebar { position: fixed; top: 0; left: -260px; z-index: 1000; width: 260px; height: 100dvh; transition: left 0.3s ease; box-shadow: 4px 0 20px rgba(0,0,0,0.5); }
    .sidebar.open { left: 0; }
    .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
    .sidebar-overlay.open { display: block; }
    .mobile-menu-btn { display: flex; background: none; border: none; color: var(--gold); cursor: pointer; font-size: 1.5rem; padding: 0; }
    main { width: 100%; }
    .px-8 { padding-left: 1rem !important; padding-right: 1rem !important; }
    .stat-value { font-size: 1.2rem; }
    .tab-btn { padding: 8px 8px; font-size: 0.65rem; }
    select, textarea, input[type=text] { font-size: 16px !important; }
  }
</style>
<script src="/dashboard/auth.js"></script>
</head>
<body class="flex">
<div class="sidebar-overlay" id="sidebar-overlay" role="button" onclick="closeSidebar()"></div>
<nav class="sidebar flex-shrink-0 flex flex-col" id="sidebar">
  <div class="p-5 border-b border-[var(--iron)]"><div class="flex items-center gap-3"><span class="tower-crest" style="font-size:2rem;text-shadow:0 0 20px rgba(226,165,41,0.4)">&#x1F3F0;</span><div><h1 class="text-lg leading-tight">Stronghold</h1><p class="text-xs text-[var(--iron-light)]">Agent Governance Platform</p></div></div></div>
  <div class="flex-1 py-4">
    <a href="/greathall" class="sidebar-item"><span style="width: 20px; height: 20px; display: inline-block; margin-right: 8px;">🏰</span> Greathall</a>
    <a href="/quota" class="sidebar-item"><span style="width: 20px; height: 20px; display: inline-block; margin-right: 8px;">📊</span> Quota</a>
    <a href="/profile" class="sidebar-item active"><span style="width: 20px; height: 20px; display: inline-block; margin-right: 8px;">👤</span> Profile</a>
    <a href="/settings" class="sidebar-item"><span style="width: 20px; height: 20px; display: inline-block; margin-right: 8px;">⚙️</span> Settings</a>
  </div>
</nav>

<main class="flex-1 p-8 overflow-y-auto">
  <div class="max-w-4xl mx-auto">
    <div class="mb-8">
      <h1 class="text-4xl font-bold mb-2">Profile</h1>
      <p class="text-gray-400">Your account and progress</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <!-- Profile Card -->
      <div class="lg:col-span-1">
        <div class="card p-6">
          <div class="flex items-center gap-4 mb-4">
            <div class="w-16 h-16 rounded-full bg-gradient-to-br from-gold-500 to-gold-700 flex items-center justify-center text-2xl">
              👤
            </div>
            <div>
              <h2 class="text-xl font-semibold">User</h2>
              <p class="text-gray-400 text-sm">Level 1 Adventurer</p>
            </div>
          </div>
          <div class="space-y-3">
            <div class="flex justify-between">
              <span class="text-gray-400 text-sm">XP</span>
              <span class="font-mono">0 / 1000</span>
            </div>
            <div class="w-full bg-gray-700 rounded-full h-2">
              <div class="bg-emerald-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Activity Feed -->
      <div class="lg:col-span-2">
        <div class="card p-6">
          <h3 class="text-lg font-semibold mb-4">Recent Activity</h3>
          <div class="space-y-4">
            <div class="flex items-center gap-3 p-3 bg-gray-800 rounded-lg">
              <div class="w-8 h-8 rounded-full bg-gray-600 flex items-center justify-center text-sm">📝</div>
              <div class="flex-1">
                <p class="text-sm">No recent activity yet</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
(function() {
  // Initialize sidebar
  const sidebar = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebar-overlay');

  function openSidebar() {
    sidebar.classList.add('open');
    sidebarOverlay.classList.add('open');
  }

  function closeSidebar() {
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('open');
  }

  // Mobile menu toggle
  const mobileMenuBtn = document.createElement('button');
  mobileMenuBtn.className = 'mobile-menu-btn';
  mobileMenuBtn.innerHTML = '☰';
  mobileMenuBtn.onclick = openSidebar;
  document.querySelector('.sidebar').prepend(mobileMenuBtn);

  // Close sidebar when clicking overlay
  sidebarOverlay.onclick = closeSidebar;

  // Update active sidebar item based on current path
  const path = window.location.pathname;
  document.querySelectorAll('.sidebar-item').forEach(item => {
    const href = item.getAttribute('href');
    if (path === href || (path.startsWith(href) && href !== '/')) {
      item.classList.add('active');
    }
  });

  // Profile page specific functionality
  if (path === '/profile') {
    // Fetch user points from API
    async function fetchUserPoints() {
      try {
        const response = await fetch('/api/user/points');
        if (!response.ok) throw new Error('Failed to fetch points');

        const data = await response.json();
        updateProfileUI(data);
      } catch (error) {
        console.error('Error fetching points:', error);
      }
    }

    function updateProfileUI(pointsData) {
      // Update XP progress
      const xpProgress = document.querySelector('.bg-emerald-500');
      const xpText = document.querySelector('.font-mono');

      if (xpProgress && xpText && pointsData) {
        const currentXP = pointsData.currentXP || 0;
        const maxXP = pointsData.maxXP || 1000;
        const level = pointsData.level || 1;

        const percentage = Math.min(100, Math.floor((currentXP / maxXP) * 100));

        xpProgress.style.width = `${percentage}%`;
        xpText.textContent = `${currentXP} / ${maxXP}`;
        document.querySelector('h2').textContent = `User`;
        document.querySelector('.text-gray-400.text-sm').textContent = `Level ${level} Adventurer`;
      }
    }

    // Load points on profile page
    if (document.querySelector('.bg-emerald-500')) {
      fetchUserPoints();
    }
  }
})();
</script>
</body>
</html>
