<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stronghold — The Great Hall</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --stone-dark: #1a1a2e;
    --stone-mid: #16213e;
    --stone-light: #1e2d4a;
    --iron: #4a4a5a;
    --iron-light: #6b6b7b;
    --gold: #e2a529;
    --gold-dim: #c9a227;
    --gold-bright: #f4c430;
    --parchment: #f5f0e1;
    --parchment-dim: #e8dcc8;
    --blood: #8b2500;
    --emerald: #2d6a4f;
    --silver: #c0c0c0;
    --bronze: #cd7f32;
  }
  body { background: linear-gradient(135deg, var(--stone-dark) 0%, var(--stone-mid) 100%); color: #d4d0c8; font-family: 'JetBrains Mono', monospace; min-height: 100vh; }
  h1,h2,h3,h4 { font-family: 'Playfair Display', Georgia, serif; color: var(--gold); }

  /* Sidebar */
  .sidebar { background: linear-gradient(180deg, #0d1321 0%, #1a1a2e 100%); border-right: 2px solid var(--iron); width: 240px; height: 100vh; overflow-y: auto; overflow-x: hidden; position: sticky; top: 0; }
  .sidebar-item { padding: 12px 20px; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; display: flex; align-items: center; gap: 10px; color: #8b8b9b; font-size: 0.85rem; }
  .sidebar-item:hover { background: rgba(226,165,41,0.08); color: var(--gold-dim); border-left-color: var(--gold-dim); }
  .sidebar-item.active { background: rgba(226,165,41,0.12); color: var(--gold); border-left-color: var(--gold); border-right-color: var(--emerald-500); }
  .sidebar-icon { font-size: 1.1rem; width: 24px; text-align: center; }

  /* Cards */
  .card { background: var(--stone-light); border: 1px solid var(--iron); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .card-header { border-bottom: 1px solid var(--iron); padding: 16px 20px; }
  .card-body { padding: 20px; }

  /* Parchment panel */
  .parchment { background: linear-gradient(135deg, var(--parchment) 0%, var(--parchment-dim) 100%); color: #2d2a26; border-radius: 6px; border: 1px solid #c4b896; }

  /* Badges — heraldic shields */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.5px; }
  .badge-t0 { background: linear-gradient(135deg, #b8860b, #daa520); color: #1a1a2e; } /* Gold crown */
  .badge-t1 { background: linear-gradient(135deg, #8b8b8b, var(--silver)); color: #1a1a2e; } /* Silver */
  .badge-t2 { background: linear-gradient(135deg, #8b6914, var(--bronze)); color: #1a1a2e; } /* Bronze */
  .badge-t3 { background: var(--iron); color: #ccc; } /* Iron */
  .badge-skull { background: #2d0000; color: #ff4444; } /* Skull */
  .badge-agent { background: rgba(226,165,41,0.15); color: var(--gold); border: 1px solid var(--gold-dim); }
  .badge-intent { background: rgba(45,106,79,0.2); color: #6fcf97; border: 1px solid var(--emerald); }
  .badge-model { background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid #3b82f6; }
  .badge-blocked { background: rgba(139,37,0,0.2); color: #ff6b6b; border: 1px solid var(--blood); }

  /* Stats */
  .stat-value { font-size: 2rem; font-weight: 700; font-family: 'Playfly Display', serif; }
  .stat-label { font-size: 0.75rem; color: var(--iron-light); text-transform: uppercase; letter-spacing: 1px; }

  /* Chat area */
  .chat-input { background: var(--stone-dark); border: 1px solid var(--iron); color: var(--parchment); }
  .chat-input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 0 2px rgba(226,165,41,0.2); }
  .msg { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* Form */
  select, textarea, input[type=text] { background: var(--stone-dark); border: 1px solid var(--iron); color: var(--parchment); border-radius: 6px; padding: 8px 12px; }
  select:focus, textarea:focus, input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 0 2px rgba(226,165,41,0.2); }
  .btn-gold { background: linear-gradient(135deg, var(--gold-dim), var(--gold)); color: #1a1a2e; font-weight: 600; cursor: pointer; border-radius: 6px; padding: 10px 24px; transition: all 0.2s; }
  .btn-gold:hover { background: linear-gradient(135deg, var(--gold), var(--gold-bright)); box-shadow: 0 0 12px rgba(226,165,41,0.3); }
  .btn-iron { background: var(--iron); color: #ccc; cursor: pointer; border-radius: 6px; padding: 8px 16px; }
  .btn-iron:hover { background: var(--iron-light); }

  /* Crest */
  .crest { font-size: 2rem; text-shadow: 0 0 20px rgba(226,165,41,0.4); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--stone-dark); }
  ::-webkit-scrollbar-thumb { background: var(--iron); border-radius: 4px; }

  /* Form collapse */
  .form-collapsed .form-fields { max-height: 0; overflow: hidden; opacity: 0; transition: all 0.4s ease; }
  .form-expanded .form-fields { max-height: 600px; opacity: 1; transition: all 0.4s ease; }
  .form-summary { display: none; font-size: 0.85rem; color: var(--iron-light); }
  .form-collapsed .form-summary { display: block; }

  /* Mobile hamburger */
  .mobile-menu-btn { display: none; }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    body { display: block; }
    .sidebar {
      position: fixed; top: 0; left: -260px; z-index: 1000;
      width: 260px; height: 100vh; height: 100dvh;
      transition: left 0.3s ease;
      box-shadow: 4px 0 20px rgba(0,0,0,0.5);
    }
    .sidebar.open { left: 0; }
    .sidebar-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 999;
    }
    .sidebar-overlay.open { display: block; }
    .mobile-menu-btn {
      display: flex; align-items: center; gap: 8px;
      background: none; border: none; color: var(--gold); cursor: pointer;
      font-size: 1.5rem; padding: 0;
    }
    main { width: 100%; }
    /* Reduce padding */
    .px-8 { padding-left: 1rem !important; padding-right: 1rem !important; }
    .py-6 { padding-top: 1rem !important; padding-bottom: 1rem !important; }
    .pb-8 { padding-bottom: 1rem !important; }
    /* Stats: 2 cols */
    .stat-value { font-size: 1.4rem; }
    .stat-label { font-size: 0.6rem; }
    /* Chat bubbles full width */
    .msg .max-w-\[80\%\] { max-width: 95% !important; }
    /* Inputs 16px to prevent iOS zoom */
    select, textarea, input[type=text], .chat-input { font-size: 16px !important; }
  }
</style>
<script src="/dashboard/auth.js"></script>
</head>
<body class="flex">

<!-- Mobile sidebar overlay -->
<div class="sidebar-overlay" id="sidebar-overlay" role="button" onclick="closeSidebar()"></div>

<!-- Sidebar — Castle Turrets -->
<nav class="sidebar flex-shrink-0 flex flex-col" id="sidebar">
  <div class="p-5 border-b border-[var(--iron)]">
    <div class="flex items-center gap-3">
      <span class="crest tower-crest">&#x1F3F0;</span>
      <div>
        <h1 class="text-lg leading-tight">Stronghold</h1>
        <p class="text-xs text-[var(--iron-light)]">Agent Governance Platform</p>
      </div>
    </div>
  </div>

  <div class="flex-1 py-4" onclick="closeSidebar()">
    <a href="/greathall" class="sidebar-item active">
      <span style="width:24px;text-align:center">&#x1F3DB;</span> Great Hall
    </a>
    <a href="/dashboard/agents" class="sidebar-item">
      <span class="sidebar-icon">&#x2694;</span> Knights
    </a>
    <a href="/dashboard/skills" class="sidebar-item">
      <span class="sidebar-icon">&#x1F6E1;</span> Armory
    </a>
    <a href="/dashboard/mcp" class="sidebar-item">
      <span style="width:24px;text-align:center">&#x1F525;</span> Forge
    </a>
    <a href="/dashboard/security" class="sidebar-item">
      <span class="sidebar-icon">&#x1F6E1;</span> Vault
    </a>
  </div>
</nav>

<main class="flex-1 p-8 overflow-auto">
  <!-- Login Form -->
  <div class="max-w-md mx-auto mt-16">
    <div class="card p-8 space-y-6">
      <div class="text-center">
        <h1 class="text-3xl font-bold text-gold">Sign In</h1>
        <p class="mt-2 text-sm text-iron-light">Enter your credentials to access the Stronghold</p>
      </div>

      <div class="space-y-4">
        <div>
          <label for="username" class="block text-sm font-medium text-iron-light mb-1">Username</label>
          <input type="text" id="username" name="username" class="w-full" autocomplete="username">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-iron-light mb-1">Password</label>
          <input type="password" id="password" name="password" class="w-full" autocomplete="current-password">
        </div>
      </div>

      <!-- Error message container -->
      <div id="error-message" class="mt-4 bg-red-900/30 border border-red-500 rounded p-3 text-red-400 text-sm hidden">
        Invalid username or password. Please try again.
        <button onclick="document.getElementById('error-message').style.display='none'" class="float-right text-red-300 hover:text-red-100">×</button>
      </div>

      <div class="pt-6">
        <button id="login-btn" class="btn-gold w-full">Sign In</button>
      </div>
    </div>
  </div>

  <!-- Progress Bar -->
  <div class="max-w-md mx-auto mt-8">
    <div class="w-full bg-gray-700 rounded-full h-2.5">
      <div id="progress-bar" class="bg-emerald-500 h-2.5 rounded-full" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
    </div>
  </div>
</main>

<script>
  // Mobile sidebar toggle
  const sidebar = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebar-overlay');
  const mobileMenuBtn = document.querySelector('.mobile-menu-btn');

  function openSidebar() {
    sidebar.classList.add('open');
    sidebarOverlay.classList.add('open');
  }

  function closeSidebar() {
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('open');
  }

  if (mobileMenuBtn) {
    mobileMenuBtn.addEventListener('click', openSidebar);
  }

  // Login form handling
  const loginBtn = document.getElementById('login-btn');
  const errorMessage = document.getElementById('error-message');
  const progressBar = document.getElementById('progress-bar');

  if (loginBtn) {
    loginBtn.addEventListener('click', async () => {
      errorMessage.style.display = 'none';

      // Simulate login process
      progressBar.style.width = '0%';
      progressBar.setAttribute('aria-valuenow', '0');

      // Simulate progress
      let progress = 0;
      const interval = setInterval(() => {
        progress += 10;
        progressBar.style.width = `${progress}%`;
        progressBar.setAttribute('aria-valuenow', `${progress}`);

        if (progress >= 100) {
          clearInterval(interval);
        }
      }, 100);
    });
  }

  // Show error message on failed login
  function showLoginError() {
    errorMessage.style.display = 'block';
    progressBar.style.width = '0%';
    progressBar.setAttribute('aria-valuenow', '0');
  }

  // Expose to global scope for auth.js
  window.showLoginError = showLoginError;
</script>
</body>
</html>
