<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stronghold — The Great Hall</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --stone-dark: #1a1a2e;
    --stone-mid: #16213e;
    --stone-light: #1e2d4a;
    --iron: #4a4a5a;
    --iron-light: #6b6b7b;
    --gold: #e2a529;
    --gold-dim: #c9a227;
    --gold-bright: #f4c430;
    --parchment: #f5f0e1;
    --parchment-dim: #e8dcc8;
    --blood: #8b2500;
    --emerald: #2d6a4f;
    --silver: #c0c0c0;
    --bronze: #cd7f32;
  }
  body { background: linear-gradient(135deg, var(--stone-dark) 0%, var(--stone-mid) 100%); color: #d4d0c8; font-family: 'JetBrains Mono', monospace; min-height: 100vh; }
  h1,h2,h3,h4 { font-family: 'Playfair Display', Georgia, serif; color: var(--gold); }

  /* Sidebar */
  .sidebar { background: linear-gradient(180deg, #0d1321 0%, #1a1a2e 100%); border-right: 2px solid var(--iron); width: 240px; height: 100vh; overflow-y: auto; overflow-x: hidden; position: sticky; top: 0; }
  .sidebar-item { padding: 12px 20px; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; display: flex; align-items: center; gap: 10px; color: #8b8b9b; font-size: 0.85rem; }
  .sidebar-item:hover { background: rgba(226,165,41,0.08); color: var(--gold-dim); border-left-color: var(--gold-dim); }
  .sidebar-item.active { background: rgba(226,165,41,0.12); color: var(--gold); border-left-color: var(--gold); }
  .sidebar-icon { font-size: 1.1rem; width: 24px; text-align: center; }

  /* Cards */
  .card { background: var(--stone-light); border: 1px solid var(--iron); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .card-header { border-bottom: 1px solid var(--iron); padding: 16px 20px; }
  .card-body { padding: 20px; }

  /* Parchment panel */
  .parchment { background: linear-gradient(135deg, var(--parchment) 0%, var(--parchment-dim) 100%); color: #2d2a26; border-radius: 6px; border: 1px solid #c4b896; }

  /* Badges — heraldic shields */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.5px; }
  .badge-t0 { background: linear-gradient(135deg, #b8860b, #daa520); color: #1a1a2e; } /* Gold crown */
  .badge-t1 { background: linear-gradient(135deg, #8b8b8b, var(--silver)); color: #1a1a2e; } /* Silver */
  .badge-t2 { background: linear-gradient(135deg, #8b6914, var(--bronze)); color: #1a1a2e; } /* Bronze */
  .badge-t3 { background: var(--iron); color: #ccc; } /* Iron */
  .badge-skull { background: #2d0000; color: #ff4444; } /* Skull */
  .badge-agent { background: rgba(226,165,41,0.15); color: var(--gold); border: 1px solid var(--gold-dim); }
  .badge-intent { background: rgba(45,106,79,0.2); color: #6fcf97; border: 1px solid var(--emerald); }
  .badge-model { background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid #3b82f6; }
  .badge-blocked { background: rgba(139,37,0,0.2); color: #ff6b6b; border: 1px solid var(--blood); }

  /* Stats */
  .stat-value { font-size: 2rem; font-weight: 700; font-family: 'Playfair Display', serif; }
  .stat-label { font-size: 0.75rem; color: var(--iron-light); text-transform: uppercase; letter-spacing: 1px; }

  /* Chat area */
  .chat-input { background: var(--stone-dark); border: 1px solid var(--iron); color: var(--parchment); }
  .chat-input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 0 2px rgba(226,165,41,0.2); }
  .msg { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* Form */
  select, textarea, input[type=text] { background: var(--stone-dark); border: 1px solid var(--iron); color: var(--parchment); border-radius: 6px; padding: 8px 12px; }
  select:focus, textarea:focus, input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 0 2px rgba(226,165,41,0.2); }
  .btn-gold { background: linear-gradient(135deg, var(--gold-dim), var(--gold)); color: #1a1a2e; font-weight: 600; cursor: pointer; border-radius: 6px; padding: 10px 24px; transition: all 0.2s; }
  .btn-gold:hover { background: linear-gradient(135deg, var(--gold), var(--gold-bright)); box-shadow: 0 0 12px rgba(226,165,41,0.3); }
  .btn-iron { background: var(--iron); color: #ccc; cursor: pointer; border-radius: 6px; padding: 8px 16px; }
  .btn-iron:hover { background: var(--iron-light); }

  /* Crest */
  .crest { font-size: 2rem; text-shadow: 0 0 20px rgba(226,165,41,0.4); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--stone-dark); }
  ::-webkit-scrollbar-thumb { background: var(--iron); border-radius: 4px; }

  /* Form collapse */
  .form-collapsed .form-fields { max-height: 0; overflow: hidden; opacity: 0; transition: all 0.4s ease; }
  .form-expanded .form-fields { max-height: 600px; opacity: 1; transition: all 0.4s ease; }
  .form-summary { display: none; font-size: 0.85rem; color: var(--iron-light); }
  .form-collapsed .form-summary { display: block; }

  /* Mobile hamburger */
  .mobile-menu-btn { display: none; }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    body { display: block; }
    .sidebar {
      position: fixed; top: 0; left: -260px; z-index: 1000;
      width: 260px; height: 100vh; height: 100dvh;
      transition: left 0.3s ease;
      box-shadow: 4px 0 20px rgba(0,0,0,0.5);
    }
    .sidebar.open { left: 0; }
    .sidebar-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 999;
    }
    .sidebar-overlay.open { display: block; }
    .mobile-menu-btn {
      display: flex; align-items: center; gap: 8px;
      background: none; border: none; color: var(--gold); cursor: pointer;
      font-size: 1.5rem; padding: 0;
    }
    main { width: 100%; }
    /* Reduce padding */
    .px-8 { padding-left: 1rem !important; padding-right: 1rem !important; }
    .py-6 { padding-top: 1rem !important; padding-bottom: 1rem !important; }
    .pb-8 { padding-bottom: 1rem !important; }
    /* Stats: 2 cols */
    .stat-value { font-size: 1.4rem; }
    .stat-label { font-size: 0.6rem; }
    /* Chat bubbles full width */
    .msg .max-w-\[80\%\] { max-width: 95% !important; }
    /* Inputs 16px to prevent iOS zoom */
    select, textarea, input[type=text], .chat-input { font-size: 16px !important; }
  }
</style>
<script src="/dashboard/auth.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const auth = await import('/dashboard/auth.js');
    const resp = await fetch('/v1/stronghold/sessions', {headers: auth.authHeaders()});
    if (!resp.ok) return;
    const sessions = await resp.json();
    if (!Array.isArray(sessions) || sessions.length === 0) return;

    const localMissions = JSON.parse(localStorage.getItem('sh_missions') || '[]');
    const localIds = {};
    localMissions.forEach(m => { localIds[m.id] = true; });

    // XPSourceCard component implementation
    class XPSourceCard extends HTMLElement {
      static get observedAttributes() {
        return ['icon', 'label', 'count'];
      }

      constructor() {
        super();
        this.attachShadow({ mode: 'open' });
      }

      connectedCallback() {
        this.render();
      }

      attributeChangedCallback(name, oldValue, newValue) {
        this.render();
      }

      render() {
        const icon = this.getAttribute('icon') || '';
        const label = this.getAttribute('label') || 'Source';
        const count = this.getAttribute('count') || '0';

        this.shadowRoot.innerHTML = `
          <div class="card w-full max-w-xs mx-auto" aria-label="${label} card">
            <div class="card-header flex items-center gap-3">
              ${icon ? `<span class="text-xl">${icon}</span>` : ''}
              <h3 class="text-lg font-semibold text-gold truncate">${label}</h3>
            </div>
            <div class="card-body">
              <div class="flex items-baseline gap-2">
                <span class="stat-value text-gold">${count}</span>
                <span class="stat-label">XP</span>
              </div>
            </div>
          </div>
        `;
      }
    }

    customElements.define('xp-source-card', XPSourceCard);

    // Create XP sources grid
    const xpSources = [
      { icon: '🏆', label: 'Missions', count: '12' },
      { icon: '🛡️', label: 'Defense', count: '8' },
      { icon: '⚔️', label: 'Combat', count: '15' },
      { icon: '🧠', label: 'Intel', count: '6' }
    ];

    const grid = document.createElement('div');
    grid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 p-6';

    xpSources.forEach(source => {
      const card = document.createElement('xp-source-card');
      card.setAttribute('icon', source.icon);
      card.setAttribute('label', source.label);
      card.setAttribute('count', source.count);
      grid.appendChild(card);
    });

    document.getElementById('xp-sources-container')?.appendChild(grid);
  });
</script>
</head>
<body class="px-4 py-6 md:px-8 md:py-8">
  <header class="flex justify-between items-center mb-8">
    <div class="flex items-center gap-4">
      <button class="mobile-menu-btn">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <h1 class="text-3xl font-bold">The Great Hall</h1>
    </div>
    <div class="crest">🏰</div>
  </header>

  <aside class="sidebar">
    <div class="p-4">
      <div class="sidebar-item active">
        <span class="sidebar-icon">🏰</span>
        <span>Dashboard</span>
      </div>
      <div class="sidebar-item">
        <span class="sidebar-icon">📊</span>
        <span>Statistics</span>
      </div>
      <div class="sidebar-item">
        <span class="sidebar-icon">⚔️</span>
        <span>Battleground</span>
      </div>
      <div class="sidebar-item">
        <span class="sidebar-icon">🧠</span>
        <span>Intel</span>
      </div>
    </div>
  </aside>

  <main class="ml-0 md:ml-64">
    <div class="parchment p-6 mb-8">
      <h2 class="text-2xl font-bold mb-4">Stronghold Overview</h2>
      <p class="mb-4">Welcome to your command center. Here you can monitor your progress, manage resources, and plan your next moves.</p>
    </div>

    <section class="mb-8">
      <h2 class="text-xl font-semibold mb-4">XP Sources</h2>
      <div id="xp-sources-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
    </section>
  </main>

  <div class="sidebar-overlay"></div>
</body>
</html>
