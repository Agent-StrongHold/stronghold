<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stronghold — The Scrolls</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --stone-dark:#1a1a2e; --stone-mid:#16213e; --stone-light:#1e2d4a; --iron:#4a4a5a; --iron-light:#6b6b7b; --gold:#e2a529; --gold-dim:#c9a227; --gold-bright:#f4c430; --parchment:#f5f0e1; --blood:#8b2500; --emerald:#2d6a4f; --copper:#cd7f32; --silver:#c0c0c0; --platinum:#e5e4e2; --diamond:#b9f2ff; }
  body { background: linear-gradient(135deg, var(--stone-dark), var(--stone-mid)); color: #d4d0c8; font-family: 'JetBrains Mono', monospace; min-height: 100vh; }
  h1,h2,h3 { font-family: 'Playfair Display', Georgia, serif; color: var(--gold); }
  .sidebar { background: linear-gradient(180deg, #0d1321, #1a1a2e); border-right: 2px solid var(--iron); width: 240px; min-height: 100vh; }
  .sidebar-item { padding: 12px 20px; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; display: flex; align-items: center; gap: 10px; color: #8b8b9b; font-size: 0.85rem; text-decoration: none; }
  .sidebar-item:hover { background: rgba(226,165,41,0.08); color: var(--gold-dim); border-left-color: var(--gold-dim); }
  .sidebar-item.active { background: #262626; color: var(--gold); border-left-color: var(--emerald); }
  .card { background: var(--stone-light); border: 1px solid var(--iron); border-radius: 8px; }
  select, textarea, input { background: var(--stone-dark); border: 1px solid var(--iron); color: var(--parchment); font-family: 'JetBrains Mono', monospace; }
  select:focus, textarea:focus, input:focus { border-color: var(--gold-dim); outline: none; }
  .btn-primary { background: linear-gradient(135deg, var(--gold-dim), var(--gold)); color: #1a1a2e; font-weight: 600; cursor: pointer; border: none; }
  .btn-primary:hover { box-shadow: 0 0 12px rgba(226,165,41,0.3); }
  .btn-secondary { background: var(--iron); color: #d4d0c8; cursor: pointer; border: none; }
  .btn-secondary:hover { background: var(--iron-light); }
  .btn-green { background: var(--emerald); color: #f5f0e1; cursor: pointer; border: none; }
  .btn-green:hover { background: #357a5a; }
  .btn-amber { background: #d97706; color: white; cursor: pointer; border: none; }
  .btn-amber:hover { background: #b45309; }
  .btn-red { background: var(--blood); color: #f5f0e1; cursor: pointer; border: none; }
  .btn-red:hover { background: #a63000; }
  .label { font-size: 0.75rem; color: var(--iron-light); margin-bottom: 0.25rem; display: block; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 0.65rem; }
  .badge-blue { background: rgba(96,165,250,0.15); color: #60a5fa; }
  .badge-green { background: rgba(45,106,79,0.3); color: #4ade80; }
  .badge-amber { background: rgba(217,119,6,0.2); color: #fbbf24; }
  .badge-red { background: rgba(139,37,0,0.3); color: #f87171; }
  .prompt-row { border-bottom: 1px solid rgba(74,74,90,0.3); cursor: pointer; transition: background 0.15s; }
  .prompt-row:hover { background: rgba(226,165,41,0.06); }
  .diff-container { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid var(--iron); border-radius: 8px; overflow: hidden; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
  .diff-header { background: rgba(74,74,90,0.4); padding: 8px 12px; font-weight: 600; font-size: 0.75rem; display: flex; align-items: center; gap: 10px; }
  .diff-left, .diff-right { min-height: 200px; max-height: 500px; overflow-y: auto; }
  .diff-line { padding: 2px 8px; white-space: pre-wrap; word-break: break-all; min-height: 1.4em; display: flex; align-items: center; gap: 10px; }
  .diff-line-num { display: inline-block; width: 30px; color: var(--iron-light); text-align: right; margin-right: 8px; user-select: none; }
  .diff-add { background: rgba(34,197,94,0.3); color: #4ade80; border-left: 3px solid #22c55e; }
  .diff-add::before { content: "+ "; color: #22c55e; font-weight: bold; }
  .diff-remove { background: rgba(248,113,113,0.3); color: #f87171; border-left: 3px solid #f87171; }
  .diff-remove::before { content: "- "; color: #f87171; font-weight: bold; }
  .diff-context { color: var(--iron-light); }
  .diff-empty { background: var(--stone-light); }
  .approval-card { border: 1px solid var(--iron); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
  .sidebar-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; }
  .sidebar-overlay.open { display:block; }
  .mobile-menu-btn { display: none; background: none; border: none; color: var(--gold); font-size: 1.5rem; cursor: pointer; }
  @media (max-width: 768px) {
    .sidebar { position:fixed; top:0; left:-260px; z-index:1000; width:260px; height:100vh; transition:left 0.3s; }
    .sidebar.open { left:0; }
    .mobile-menu-btn { display:block; }
  }
  .error-message { margin-top: 1rem; }
</style>
<script src="/dashboard/auth.js"></script>
<script>
const API = "/api";
const TAILWIND_CDN = "https://cdn.tailwindcss.com";

let currentPrompt = "";
let fromLabel = "";
let toLabel = "";

async function loadVersionHistory() {
  const container = document.getElementById('prompt-detail');
  if (!container || container.classList.contains('hidden')) return;

  const promptList = document.getElementById('prompt-list');
  if (!promptList) return;

  promptList.innerHTML = `<div class="p-4 text-sm text-[var(--iron-light)] sh-loading">&#x1F5E3; Loading prompt versions...</div>`;

  try {
    const response = await fetch(API + '/v1/stronghold/prompts');
    if (!response.ok) throw new Error('Failed to load prompts');

    const prompts = await response.json();
    if (!Array.isArray(prompts)) throw new Error('Invalid prompts data');

    currentPrompt = document.getElementById('detail-label')?.value || "";
    fromLabel = document.getElementById('from-label')?.value || "";
    toLabel = "production";

    // Update active state colors in sidebar
    document.querySelectorAll('.sidebar-item').forEach(item => {
      if (item.getAttribute('href')?.includes('prompts')) {
        item.classList.add('active');
        // Ensure Tailwind classes are applied for active state
        item.style.backgroundColor = "rgba(38,38,38,1)";
        item.style.color = "var(--gold)";
        item.style.borderLeftColor = "var(--emerald)";
      }
    });

    // Show prompt list
    document.getElementById('prompt-detail')?.classList.add('hidden');
    promptList.innerHTML = '';

    // Create prompt items with version history
    for (const prompt of prompts) {
      const item = document.createElement('div');
      item.className = "prompt-row p-4 flex justify-between items-center";
      item.innerHTML = `
        <div class="flex items-center gap-3">
          <span style="font-size:1.2rem">&#x1F4DC;</span>
          <div>
            <h3 class="font-medium text-[var(--parchment)]">${prompt.name || 'Untitled'}</h3>
            <p class="text-xs text-[var(--iron-light)]">${prompt.versions?.length || 0} versions</p>
          </div>
        </div>
        <span class="badge badge-green">v${prompt.versions?.at(-1)?.label || 'unknown'}</span>
      `;
      promptList.appendChild(item);
    }

  } catch (error) {
    console.error("Error loading version history:", error);
    promptList.innerHTML = `<div class="p-4 text-sm text-[var(--blood)] error-message">&#128145; Failed to load scrolls: ${error.message}</div>`;
  }
}

function showCreate() {
  const container = document.getElementById('prompt-detail');
  if (!container) return;

  // Clear previous content
  container.innerHTML = '';

  // Create header
  const header = document.createElement('header');
  header.className = "px-8 py-6 border-b border-[var(--iron)] flex items-center justify-between";
  header.innerHTML = `
    <h2 class="text-2xl font-bold">Create New Prompt</h2>
    <button class="btn-primary px-4 py-2 rounded-md" onclick="loadVersionHistory()">Cancel</button>
  `;
  container.appendChild(header);

  // Create form
  const form = document.createElement('form');
  form.className = "p-8 space-y-6";
  form.innerHTML = `
    <div>
      <label class="label">Prompt Name</label>
      <input type="text" class="w-full p-3 rounded-md bg-[var(--stone-dark)] border border-[var(--iron)] focus:border-[var(--gold-dim)] outline-none" placeholder="e.g., Customer Support Bot">
    </div>
    <div>
      <label class="label">Prompt Content</label>
      <textarea class="w-full p-3 rounded-md bg-[var(--stone-dark)] border border-[var(--iron)] focus:border-[var(--gold-dim)] outline-none min-h-[200px]" placeholder="Enter your prompt instructions here..."></textarea>
    </div>
    <div class="flex gap-4">
      <button type="submit" class="btn-primary flex-1 py-3 rounded-md">Create Prompt</button>
      <button type="button" class="btn-secondary flex-1 py-3 rounded-md" onclick="loadVersionHistory()">Cancel</button>
    </div>
  `;
  container.appendChild(form);
}

function showDiff(oldContent, newContent) {
  const container = document.getElementById('prompt-detail');
  if (!container) return;

  container.innerHTML = '';
  const header = document.createElement('header');
  header.className = "px-8 py-6 border-b border-[var(--iron)] flex items-center justify-between";
  header.innerHTML = `
    <h2 class="text-2xl font-bold">Diff Viewer</h2>
    <button class="btn-primary px-4 py-2 rounded-md" onclick="loadVersionHistory()">Back to List</button>
  `;
  container.appendChild(header);

  const diffContainer = document.createElement('div');
  diffContainer.className = "diff-container mx-8 my-6";
  diffContainer.innerHTML = `
    <div class="diff-header">
      <span class="flex-1">${fromLabel || 'old'}</span>
      <span class="flex-1">${toLabel || 'new'}</span>
    </div>
    <div class="diff-left" id="diff-left"></div>
    <div class="diff-right" id="diff-right"></div>
  `;
  container.appendChild(diffContainer);

  // Simple diff implementation
  const oldLines = oldContent.split('\n');
  const newLines = newContent.split('\n');

  const diffLeft = document.getElementById('diff-left');
  const diffRight = document.getElementById('diff-right');

  // Add line numbers to both sides
  for (let i = 0; i < Math.max(oldLines.length, newLines.length); i++) {
    const oldLine = oldLines[i] || '';
    const newLine = newLines[i] || '';

    // Create line elements for both sides
    const oldLineEl = document.createElement('div');
    oldLineEl.className = 'diff-line';
    oldLineEl.innerHTML = `<span class="diff-line-num">${i + 1}</span><span>${oldLine}</span>`;

    const newLineEl = document.createElement('div');
    newLineEl.className = 'diff-line';
    newLineEl.innerHTML = `<span class="diff-line-num">${i + 1}</span><span>${newLine}</span>`;

    // Compare lines to determine diff type
    if (oldLine === newLine) {
      oldLineEl.classList.add('diff-context');
      newLineEl.classList.add('diff-context');
    } else if (newLine.startsWith('+')) {
      oldLineEl.classList.add('diff-empty');
      newLineEl.classList.add('diff-add');
    } else if (oldLine.startsWith('-')) {
      oldLineEl.classList.add('diff-remove');
      newLineEl.classList.add('diff-empty');
    } else {
      oldLineEl.classList.add('diff-remove');
      newLineEl.classList.add('diff-add');
    }

    diffLeft.appendChild(oldLineEl);
    diffRight.appendChild(newLineEl);
  }
}
</script>
</head>
<body class="antialiased">
  <div class="flex min-h-screen">
    <aside class="sidebar">
      <nav class="py-4">
        <a href="/dashboard/prompts" class="sidebar-item active">
          <span>&#x1F4E4;</span>
          <span>Scrolls</span>
        </a>
        <a href="/dashboard/approvals" class="sidebar-item">
          <span>&#x1F4C4;</span>
          <span>Approvals</span>
        </a>
        <a href="/dashboard/settings" class="sidebar-item">
          <span>&#x1F527;</span>
          <span>Settings</span>
        </a>
      </nav>
    </aside>

    <main class="flex-1 p-8">
      <div id="prompt-list" class="space-y-2">
        <div class="p-4 text-sm text-[var(--iron-light)] sh-loading">&#x1F5E3; Loading scrolls...</div>
      </div>

      <div id="prompt-detail" class="hidden"></div>
    </main>
  </div>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <button class="mobile-menu-btn" id="mobile-menu-btn">&#9776;</button>

  <script>
    // Mobile menu toggle
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const sidebar = document.querySelector('.sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');

    mobileMenuBtn.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      sidebarOverlay.classList.toggle('open');
    });

    sidebarOverlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('open');
    });

    // Load initial content
    document.addEventListener('DOMContentLoaded', loadVersionHistory);
  </script>
</body>
</html>
