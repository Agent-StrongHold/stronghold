<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stronghold — The Knights</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --stone-dark:#1a1a2e; --stone-mid:#16213e; --stone-light:#1e2d4a; --iron:#4a4a5a; --iron-light:#6b6b7b; --gold:#e2a529; --gold-dim:#c9a227; --parchment:#f5f0e1; --blood:#8b2500; --emerald:#2d6a4f; }
  body { background: linear-gradient(135deg, var(--stone-dark), var(--stone-mid)); color: #d4d0c8; font-family: 'JetBrains Mono', monospace; min-height: 100vh; }
  h1,h2,h3 { font-family: 'Playfair Display', Georgia, serif; color: var(--gold); }
  .sidebar { background: linear-gradient(180deg, #0d1321, #1a1a2e); border-right: 2px solid var(--iron); width: 240px; min-height: 100vh; }
  .sidebar-item { padding: 12px 20px; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; display: flex; align-items: center; gap: 10px; color: #8b8b9b; font-size: 0.85rem; text-decoration: none; }
  .sidebar-item:hover { background: rgba(226,165,41,0.08); color: var(--gold-dim); border-left-color: var(--gold-dim); }
  .sidebar-item.active { background: rgba(226,165,41,0.12); color: var(--gold); border-left-color: var(--gold); }
  .card { background: var(--stone-light); border: 1px solid var(--iron); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .knight-card { transition: transform 0.2s, box-shadow 0.2s; }
  .knight-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(226,165,41,0.15); }
  .sigil { font-size: 2.5rem; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid var(--gold-dim); background: rgba(226,165,41,0.08); }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: 500; }
  .badge-strategy { background: rgba(96,165,250,0.15); color: #60a5fa; }
  .badge-tool { background: rgba(45,106,79,0.15); color: #6fcf97; font-size: 0.65rem; }
  .btn-gold { background: linear-gradient(135deg, var(--gold-dim), var(--gold)); color: #1a1a2e; font-weight: 600; cursor: pointer; border-radius: 6px; padding: 8px 16px; border: none; font-size: 0.85rem; }
  .btn-gold:hover { box-shadow: 0 0 12px rgba(226,165,41,0.3); }
  .btn-sm { padding: 4px 10px; font-size: 0.75rem; border-radius: 4px; cursor: pointer; border: none; }
  .btn-iron { background: var(--iron); color: #d4d0c8; }
  .btn-iron:hover { background: var(--iron-light); }
  .btn-blood { background: var(--blood); color: #f5f0e1; }
  .btn-blood:hover { background: #a63000; }
  .btn-emerald { background: var(--emerald); color: #f5f0e1; }
  .btn-emerald:hover { background: #3a8a63; }
  select, input[type=text], textarea { background: var(--stone-dark); border: 1px solid var(--iron); color: var(--parchment); border-radius: 6px; padding: 8px 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; width: 100%; }
  select:focus, input:focus, textarea:focus { border-color: var(--gold-dim); outline: none; }
  label.field-label { font-size: 0.75rem; color: var(--iron-light); margin-bottom: 4px; display: block; }
  .form-panel { transition: max-height 0.3s ease, opacity 0.3s ease; overflow: hidden; }
  .form-panel.collapsed { max-height: 0; opacity: 0; padding-top: 0; padding-bottom: 0; }
  .form-panel.expanded { max-height: 1200px; opacity: 1; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--stone-dark); }
  ::-webkit-scrollbar-thumb { background: var(--iron); border-radius: 4px; }
  /* Mobile */
  .mobile-menu-btn { display: none; }
  @media (max-width: 768px) {
    body { display: block; }
    .sidebar {
      position: fixed; top: 0; left: -260px; z-index: 1000;
      width: 260px; height: 100vh; height: 100dvh;
      transition: left 0.3s ease;
      box-shadow: 4px 0 20px rgba(0,0,0,0.5);
    }
    .sidebar.open { left: 0; }
    .sidebar-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 999;
    }
    .sidebar-overlay.open { display: block; }
    .mobile-menu-btn {
      display: flex; align-items: center; gap: 8px;
      background: none; border: none; color: var(--gold); cursor: pointer;
      font-size: 1.5rem; padding: 0;
    }
    main { width: 100%; }
    .px-8 { padding-left: 1rem !important; padding-right: 1rem !important; }
    .py-6 { padding-top: 1rem !important; padding-bottom: 1rem !important; }
    .stat-value { font-size: 1.4rem; }
    .stat-label { font-size: 0.6rem; }
    select, textarea, input[type=text] { font-size: 16px !important; }
  }
  .agent-description {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .agent-description:hover {
    overflow: visible;
    white-space: normal;
    word-break: break-word;
  }
</style>
<script src="/dashboard/auth.js"></script>
</head>
<body class="flex">
<div class="sidebar-overlay" id="sidebar-overlay" role="button" onclick="closeSidebar()"></div>

<nav class="sidebar flex-shrink-0 flex flex-col" id="sidebar">
  <div class="p-5 border-b border-[var(--iron)]">
    <div class="flex items-center gap-3">
      <span class="tower-crest" style="font-size:2rem; text-shadow: 0 0 20px rgba(226,165,41,0.4)">&#x1F3F0;</span>
      <div><h1 class="text-lg leading-tight">Stronghold</h1><p class="text-xs text-[var(--iron-light)]">Agent Governance Platform</p></div>
    </div>
  </div>
  <div class="flex-1 py-4">
    <a href="/greathall" class="sidebar-item"><span style="width:24px;text-align:center">&#x1F3DB;</span> Great Hall</a>
    <a href="/dashboard/agents" class="sidebar-item active"><span style="width:24px;text-align:center">&#x2694;</span> Knights</a>
    <a href="/dashboard/skills" class="sidebar-item"><span style="width:24px;text-align:center">&#x1F6E1;</span> Armory</a>
    <a href="/dashboard/mcp" class="sidebar-item"><span style="width:24px;text-align:center">&#x1F525;</span> Forge</a>
    <a href="/dashboard/security" class="sidebar-item"><span style="width:24px;text-align:center">&#x1F5FC;</span> Watchtower</a>
    <a href="/dashboard/outcomes" class="sidebar-item"><span style="width:24px;text-align:center">&#x1F4B0;</span> Treasury</a>
    <a href="/dashboard/quota" class="sidebar-item"><span style="width:24px;text-align:center">&#x2696;</span> Ledger</a>
    <a href="/prompts" class="sidebar-item"><span style="width:24px;text-align:center">&#x1F4DC;</span> Scrolls</a>
  </div>
  <div class="py-2 border-t border-[var(--iron)]">
    <a href="/dashboard/profile" class="sidebar-item"><span style="width:24px;text-align:center">&#x1F464;</span> Profile</a>
  </div>
  <div class="p-4 border-t border-[var(--iron)] text-xs text-[var(--iron-light)]">
    <div class="flex justify-between items-center"><span>v0.1.0</span><a href="/logout" onclick="strongholdLogout();return false" style="color:var(--iron-light);text-decoration:none;transition:color 0.2s" class="sh-logout">Logout</a></div>
  </div>
</nav>

<main class="flex-1 overflow-auto">
  <header class="px-8 py-6 border-b border-[var(--iron)] flex items-center justify-between">
    <div>
      <div class="flex items-center gap-3"><button class="mobile-menu-btn" onclick="openSidebar()">&#x2630;</button><h2 class="text-2xl">&#x2694; The Knights</h2></div>
      <p class="text-sm text-[var(--iron-light)] mt-1">Specialist agents sworn to defend the realm</p>
    </div>
    <div class="flex gap-2">
      <label class="btn-iron btn-sm flex items-center gap-1" style="cursor:pointer">
        &#x1F4E5; Import Zip
        <input type="file" accept=".zip" id="import-file" style="display:none">
      </label>
      <button class="btn-iron btn-sm" onclick="promptImportUrl()">&#x1F517;<
</button></div>
  </header>

  <div class="px-8 py-6">
    <h2 class="text-xl text-[var(--gold)] mb-6">Agent Roster</h2>

    <div id="agents-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Agent cards will be rendered here by JavaScript -->
    </div>
  </div>
</main>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const agentsContainer = document.getElementById('agents-container');

    // Sample agent data - in a real app this would come from an API
    const agents = [
      {
        id: 1,
        name: 'Sir Aldric the Wise',
        description: 'A veteran strategist with decades of experience in castle defense and siege warfare. Specializes in long-term tactical planning and resource allocation for sustained defense operations.',
        tools: ['Longsword', 'Shield Wall', 'Tactical Planning'],
        sigil: '&#9876;'
      },
      {
        id: 2,
        name: 'Lady Elara the Arcane',
        description: 'Master of arcane arts and defensive enchantments. Can summon protective barriers and detect magical intrusions before they breach castle walls.',
        tools: ['Arcane Barrier', 'Detection Runes', 'Healing Spells'],
        sigil: '&#9731;'
      },
      {
        id: 3,
        name: 'Garrick the Unbreakable',
        description: 'A towering knight with legendary endurance. His mere presence on the battlements demoralizes would-be attackers and inspires castle defenders to greater feats.',
        tools: ['Greatsword', 'Heavy Armor', 'Morale Boost'],
        sigil: '&#9877;'
      },
      {
        id: 4,
        name: 'Mira the Swift',
        description: 'Elven scout and messenger with unmatched speed and stealth. Can traverse the castle grounds undetected and deliver critical intelligence to commanders in record time.',
        tools: ['Short Bow', 'Stealth', 'Message Magic'],
        sigil: '&#9732;'
      },
      {
        id: 5,
        name: 'Brother Cedric the Pious',
        description: 'The castle chaplain who maintains spiritual defenses and morale among the garrison. His prayers can temporarily strengthen castle walls against magical attacks.',
        tools: ['Prayer', 'Blessing', 'Counsel'],
        sigil: '&#9999;'
      }
    ];

    agents.forEach(agent => {
      const agentCard = document.createElement('div');
      agentCard.className = 'card p-6 knight-card';
      agentCard.innerHTML = `
        <div class="flex items-start gap-4">
          <div class="sigil">${agent.sigil}</div>
          <div class="flex-1 min-w-0">
            <h3 class="text-lg font-bold text-[var(--gold)] truncate" title="${agent.name}">${agent.name}</h3>
            <p class="text-sm text-[var(--iron-light)] mt-2 truncate" title="${agent.description}">${agent.description}</p>
          </div>
        </div>
        <div class="mt-4">
          <h5 class="text-iron-light mb-2 text-sm font-medium">Tools:</h5>
          <ul class="list-disc list-inside text-sm text-[var(--iron-light)] space-y-1">
            ${agent.tools.map(tool => `<li>${tool}</li>`).join('')}
          </ul>
        </div>
        <div class="mt-4 flex gap-2">
          <button class="btn-gold btn-sm flex-1" onclick="viewAgent(${agent.id})">View Details</button>
          <button class="btn-iron btn-sm flex-1" onclick="editAgent(${agent.id})">Edit</button>
        </div>
      `;
      agentsContainer.appendChild(agentCard);
    });

    // Mobile menu functionality
    function openSidebar() {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('sidebar-overlay').classList.add('open');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.remove('open');
    }
  });
</script>

</body>
</html>
