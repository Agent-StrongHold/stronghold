<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Agent Turing — UI</title>
  <meta name="viewport" content="width=1600" />
  <link rel="stylesheet" href="styles/colors_and_type.css" />
  <link rel="stylesheet" href="styles/crt.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #050507; }
    .artboard-shell { width: 100%; height: 100%; overflow: hidden; background: var(--ink-1); position: relative; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components/design-canvas.jsx"></script>
  <script type="text/babel" src="components/ui.jsx"></script>
  <script type="text/babel" src="components/chat.jsx"></script>
  <script type="text/babel" src="components/notebook.jsx"></script>
  <script type="text/babel" src="components/blog.jsx"></script>
  <script type="text/babel" src="components/profile.jsx"></script>
  <script type="text/babel" src="components/memory.jsx"></script>

  <script type="text/babel">
    function Frame({ children }) {
      return <div className="artboard-shell">{children}</div>;
    }

    function App() {
      return (
        <DesignCanvas title="Agent Turing · UI" subtitle="Chat · Notebook · Blog · Profile — handler POV, operator console">
          <DCSection id="chat" title="Chat · handler ↔ AT-01" subtitle="Daily initiation budget · Turing-initiated threads marked · typewriter reveal · inline memory citations">
            <DCArtboard id="chat-main" label="Wire · clickable" width={1440} height={900}>
              <Frame><Chat.App /></Frame>
            </DCArtboard>
          </DCSection>

          <DCSection id="notebook" title="Notebook · themed Obsidian" subtitle="Turing's working memory vault — empty templates, not yet authored">
            <DCArtboard id="nb-main" label="Vault · editor + graph" width={1440} height={900}>
              <Frame><Notebook.App /></Frame>
            </DCArtboard>
          </DCSection>

          <DCSection id="blog" title="Blog · WordPress theme" subtitle="turing.field — a field dossier, published irregularly. Phosphor/Noir theme.">
            <DCArtboard id="blog-main" label="Home · post · about" width={1280} height={1600}>
              <Frame><Blog.App /></Frame>
            </DCArtboard>
          </DCSection>

          <DCSection id="profile" title="Profile · asset dossier" subtitle="Metrics · personality facets · 7-tier memory distribution · passions · regret/affirmation">
            <DCArtboard id="profile-main" label="Asset dossier" width={1440} height={1100}>
              <Frame><Profile.App /></Frame>
            </DCArtboard>
          </DCSection>

          <DCSection id="memory" title="Memory · raw DB inspector" subtitle="7-tier inspector · tier nav · row list · edit/promote/demote/expire/burn · floor violations surfaced">
            <DCArtboard id="memory-main" label="DB inspector · clickable" width={1440} height={900}>
              <Frame><Memory.App /></Frame>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
