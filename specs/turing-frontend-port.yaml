# Spec 1187: Frontend port — Phosphor/Noir shell + six stub surfaces + installable themes
#
# Parent: UI Plan — Turing's Field Console (see docs/ui-plan.md +
# specs/TURING-CONSOLE-README.md).
#
# This is PR 2 in the Turing console implementation order. No backend endpoints
# are wired in this PR — the surfaces render against stub fixtures whose shape
# matches each backend spec's API contract. Backend PRs (1178, 1179, 1181–1186)
# then swap stubs for live endpoints without modifying the ported scaffolding.
#
# Reference assets live in the Claude Design bundle at
# https://api.anthropic.com/v1/design/h/Ep6F75A8GJNtWBrIKNDIdw — implementers
# refetch and pixel-match. The bundle contains: five standalone HTML surfaces
# (Chat, Notebook, Profile, Memory, index hub) with matching JSX components;
# shared CSS (colors_and_type.css, crt.css); a full Phosphor/Noir WordPress
# FSE block theme; a Phosphor/Noir Obsidian theme; SVG assets.
#
# Two renames apply at port time: Memory → Synapse, Profile → Dossier (see
# docs/ui-plan.md). The bundle's Profile card already shows "◆ PR-03 · DOSSIER"
# as its subtitle — the rename is cosmetic-to-surface only and does not touch
# src/stronghold/memory/ internals.
#
# The bundle has no Skills-Lab mock. The Skills Lab surface in this port
# matches the Phosphor/Noir conventions established by the other five surfaces
# (topbar, classification banner, section-label chrome, card grid, amber for
# pending / burn for destructive). Spec 1185 owns the API; this spec owns the
# stub page.

