acceptance_criteria:
  - "src/stronghold/dashboard/styles/tokens.css exposes the full Phosphor/Noir CSS custom-property set (--ink-0..5, --bone-0..1, --phosphor + --phosphor-hi/mid/dim/deep/ink, --amber, --burn, type families, type scale, tracking scale, 4px spacing scale, radii, motion easings/durations) byte-equivalent to the bundle's colors_and_type.css"
  - "src/stronghold/dashboard/styles/crt.css is byte-equivalent to the bundle's crt.css and is opt-in via a body class (.crt-on) that can be toggled from an app-shell setting"
  - "Six pages are mounted at /dashboard/chat, /dashboard/notebook, /dashboard/blog, /dashboard/dossier, /dashboard/synapse, /dashboard/skills-lab; unknown /dashboard/* routes return a 404 surface themed to match"
  - "The app shell renders a topbar (project mark, breadcrumb, UTC clock, wire status), optional classification banner, and a left-rail nav that lists the six surfaces; nav uses phosphor glow on hover"
  - "Each of the six pages imports its stub fixture from src/stronghold/dashboard/stubs/<surface>.json and renders against it; no live API calls are made in this spec"
  - "Stub fixtures match the response shapes declared in the corresponding backend spec's acceptance_criteria: chat.json → spec 1182 SSE payload shapes; notebook.json → spec 1183 tree/note/graph shapes; dossier.json → spec 1184 {bio, autobiography_latest, facets[], cumulative_drift, vitals}; synapse.json → spec 1181 {tiers[], rows[], row_detail}; skills-lab.json → spec 1185 skills list + pending queue shapes; blog.json → spec 1179 post list + draft shapes"
  - "The Memory → Synapse rename is applied consistently: no file under src/stronghold/dashboard/ references memory.jsx, Memory.html, /api/memory, or memory_crud; all references use synapse.jsx, Synapse.html (or pages/synapse.jsx), /api/synapse, synapse_crud"
  - "The Profile → Dossier rename is applied consistently: no file under src/stronghold/dashboard/ references profile.jsx, Profile.html (as a Turing surface), /api/profile, or profile_read; all references use dossier.jsx, pages/dossier.jsx, /api/dossier, dossier_read"
  - "Legacy castle-themed pages (agents.html, dungeon.html, mason.html, prompts.html, scan-report.js, profile.html) are removed and their links are scrubbed from any index.html / README pointers in the repo; a grep for 'Great Hall', 'Knights', 'Armory', 'Watchtower', 'Treasury', 'Scrolls' inside src/ returns zero hits (references in BACKLOG.md / ROADMAP.md / CHANGELOG.md are preserved as historical record)"
  - "themes/wordpress/phosphor-noir/ installs cleanly in WordPress 6.4+: theme.json validates against the WP schema; functions.php has no parse errors under PHP 8.1+; readme.txt passes the WordPress theme-check linter for block themes"
  - "themes/obsidian/phosphor-noir/ contains a valid manifest.json ({name, version, minAppVersion, author, authorUrl}) and a theme.css that loads without console errors in Obsidian 1.5+; test_themes_installable.py verifies the manifest shape and that theme.css parses"
  - "The dashboard works in the three latest stable versions of Chrome, Firefox, and Safari; font imports fall back to system stacks when the Google Fonts CDN is unreachable (VT323 → 'IBM Plex Mono' → monospace; IBM Plex Mono → SF Mono → Menlo → monospace; IBM Plex Sans → system-ui → sans-serif; IBM Plex Serif → Georgia → serif)"
  - "SVG assets are served with Content-Type: image/svg+xml; no SVG contains inline event handlers (onload, onclick, ...) or external script references"
  - "Design-token test (tests/dashboard/test_design_tokens.py) parses tokens.css and asserts presence + exact hex values for every token enumerated in docs/ui-plan.md"
  - "Router test (tests/dashboard/test_router.py) asserts each of the six routes mounts the expected page component and that unknown /dashboard/* routes render the 404 surface"
  - "Stub-shape test (tests/dashboard/test_stub_fixtures_shape.py) validates each JSON fixture against a pydantic schema derived from the corresponding backend spec's response shape"
  - "Rename test (tests/dashboard/test_rename_consistency.py) fails if the strings 'memory.jsx', 'Memory.html', '/api/memory', 'memory_crud', 'profile.jsx' (as a Turing surface), 'Profile.html', '/api/profile' appear anywhere under src/stronghold/dashboard/"
  - "The frontend port ships zero business logic: no file under src/stronghold/dashboard/ imports from src/stronghold/memory/, src/stronghold/router/, src/stronghold/security/, or any other business-logic module"
  - "All writes (if any — e.g. CRT-toggle persistence) go to localStorage and carry no identifying data"

invariants:
  - name: no_live_api_in_port
    description: "The port PR ships stubs only; no fetch/axios call to a /api/* endpoint exists inside dashboard/ outside of a clearly marked TODO-stub hook that will be filled in by the corresponding backend PR"
    kind: state_invariant
    expression: "grep -r 'fetch(\\'/api' src/stronghold/dashboard/ returns 0 hits outside files ending .stub-hook.jsx"
    severity: critical

  - name: rename_is_total
    description: "Legacy surface names (Memory, Profile for the Turing dossier) do not appear anywhere in the ported dashboard tree"
    kind: state_invariant
    expression: "tests/dashboard/test_rename_consistency.py passes"
    severity: critical

  - name: tokens_are_source_of_truth
    description: "Surface pages reference design values only via CSS custom properties from tokens.css; no hardcoded phosphor/ink/bone hex values appear in page or component CSS"
    kind: state_invariant
    expression: "grep -rE '#(5EE88C|A8FF8E|F2F0EA|ECEAE3|0A0B0A|FFB547|FF5A4E)' src/stronghold/dashboard/ returns hits only in styles/tokens.css"
    severity: high

  - name: no_business_logic_in_ui
    description: "The dashboard tree depends only on the backend via HTTP (future) and reads stubs from disk (now); no direct Python imports of stronghold business logic"
    kind: state_invariant
    expression: "no .jsx/.ts(x)/.js/.py file under src/stronghold/dashboard/ imports from src/stronghold/{memory,router,security,classifier,agents,protocols}/"
    severity: critical

  - name: themes_are_installable_verbatim
    description: "themes/wordpress/phosphor-noir/ and themes/obsidian/phosphor-noir/ are copied verbatim from the design bundle and carry no references to Stronghold internals; they are standalone artifacts end-users can drop into a WordPress or Obsidian install"
    kind: state_invariant
    expression: "grep -rE 'stronghold|src/stronghold' themes/ returns 0 hits"
    severity: critical

  - name: no_inline_svg_scripts
    description: "No SVG asset contains inline JavaScript (onload / onclick / <script>)"
    kind: state_invariant
    expression: "grep -rE '<script|onload=|onclick=|onerror=' src/stronghold/dashboard/assets/*.svg returns 0 hits"
    severity: critical

  - name: fonts_degrade_gracefully
    description: "Every font-family declaration ends in a system fallback; no declaration ships that would render Times-New-Roman under CDN failure"
    kind: state_invariant
    expression: "every font-family declaration in tokens.css has at least two fallbacks terminating in a generic family (serif | sans-serif | monospace)"
    severity: high

  - name: port_is_additive_for_non_turing_pages
    description: "The port PR does not modify or delete dashboard pages that are not castle-themed Turing surfaces (login, auth, leaderboard, mcp, org, outcomes, quota, security, skills, team stay untouched); a follow-up PR will port them"
    kind: state_invariant
    expression: "git diff --name-status base..head -- src/stronghold/dashboard/ shows no modifications to the preserved set enumerated in files_touched comments"
    severity: high

  - name: classification_banner_is_cosmetic
    description: "The `[ CLASSIFIED · HANDLER EYES ONLY ]` banner is purely visual chrome; it does not gate, hide, or alter any data rendered on the surface"
    kind: state_invariant
    expression: "no conditional in any page component keys off the banner's mount state"
    severity: medium
