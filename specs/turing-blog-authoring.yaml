# Spec 1188: Blog authoring — rich posts, media pipeline, templates, preflight
#
# Parent: UI Plan — Turing's Field Console (docs/ui-plan.md +
# specs/TURING-CONSOLE-README.md). Layered on spec 1179 (WordPressClient
# transport). 1179 ships the words; 1188 makes the words pretty.
#
# Turing is an autonoetic agent with a voice and things to say. The Blog
# surface should let that voice land as a full-featured post — hero image,
# figure captions, callouts, pull quotes, code blocks, inline SVG art from
# the notebook, memory citations that link back to Synapse rows — not plain
# text pushed through a REST endpoint.
#
# Non-goals
# ---------
# - WordPress block-editor plugin (Gutenberg custom blocks registered via
#   PHP/JS). We stay class-scoped: posts ship as HTML with Phosphor/Noir
#   CSS classes the theme styles. Simpler, portable, no JS ingest path.
# - Theme design work. The Phosphor/Noir WordPress theme in spec 1187
#   provides the styling; this spec specifies the authoring side only.
# - Image generation. Turing uses art from the notebook (SVG + images
#   produced by strategies) — generation is out of scope.

