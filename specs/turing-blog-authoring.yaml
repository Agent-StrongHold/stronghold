acceptance_criteria:
  # ── data model ──
  - "types/wordpress_rich.py defines RichPost extending the 1179 WordPressPost with: slug, hero_image (MediaRef), hero_alt, body_markdown, inline_media[], embeds[], scheduled_publish_at, series (name + index), css_class, memory_citations[], og_image, twitter_card"
  - "MediaRef is a typed record {local_path | vault_path, alt, caption?, credit?} resolved to a WP media library id before publish; never a raw URL at author time"
  - "Every RichPost field has a default that makes the minimum-viable post a valid post (empty categories, empty inline_media, no series, css_class None); only title, body_markdown, hero_image, and hero_alt are strictly required"

  # ── markdown dialect ──
  - "markdown_dialect.py registers a Phosphor/Noir dialect on top of CommonMark: fenced-class blocks with triple-colon syntax (`:::callout phosphor`, `:::pullquote`, `:::terminal`, `:::classified`, `:::field-note`), figure syntax (`![alt](path 'caption')` renders as <figure> with <figcaption>), footnote-style memory citations (`[^mem:tier:id]`), inline SVG fences (```svg ... ```), and first-class horizontal rules (---) styled by the theme"
  - "The dialect round-trips: for any RichPost generated by the compose tool, parse(stringify(post)) == post"
  - "Unknown fenced-class names are preserved in output with an `unknown-class-<name>` wrapper class; they never silently drop"

  # ── markdown → HTML ──
  - "markdown_to_html.py converts RichPost.body_markdown to Phosphor/Noir-themed HTML: fenced-class blocks become <div class='pn-callout pn-callout--phosphor'>…, figures become <figure class='pn-figure'><img …><figcaption>…; code blocks get a language-X class and a data-lang attribute; external links get rel='noopener noreferrer nofollow'"
  - "The converter is pure: same input yields byte-identical output; no network, no filesystem"
  - "Output HTML passes an allowlist sanitiser (no <script>, no inline event handlers, no javascript: URLs, no <iframe> outside of the embeds allowlist) — sanitisation is post-conversion and enforced"
  - "Inline SVGs are sanitised via the same SVG ruleset as spec 1187 (no <script>, no onload/onclick, no external references)"

  # ── media pipeline ──
  - "media_pipeline.py exposes async upload_media(MediaRef) -> PublishedMedia returning {wp_media_id, url, width, height, mime}; images are uploaded to the WP Media Library via REST before the post itself is submitted"
  - "Uploads deduplicate by content hash: uploading the same bytes twice returns the existing wp_media_id on the second call (no duplicate media rows)"
  - "Supported formats: image/png, image/jpeg, image/webp, image/svg+xml; every format has a size cap (PNG/JPEG/WebP ≤ 8MB, SVG ≤ 200KB); oversize uploads raise MediaTooLarge before network call"
  - "Uploads set alt text on the WP media record (post_excerpt in WP API terms) from MediaRef.alt — never empty"
  - "After upload, body_markdown references to the original path are rewritten to the published URL in the final HTML"

  # ── preflight ──
  - "preflight.py exposes preflight(RichPost) -> PreflightReport with a list of issues {severity: 'error' | 'warning', code, message, location?}; errors block publish, warnings do not"
  - "Preflight enforces as errors: missing title, missing hero_image, missing hero_alt, any image without alt, body_markdown < 200 chars (configurable floor), unresolved citations (memory_id not found), broken intra-vault links (target note does not exist), external links on domains not in the allowlist"
  - "Preflight emits as warnings: no categories, no tags, excerpt < 40 chars, no H2 in the body, figure without caption, code block without a language"
  - "publish() in 1179 is wrapped: calling publish(RichPost) runs preflight first; any error-severity issue returns PreflightFailed without making a network call"

  # ── templates ──
  - "Five templates ship under integrations/wordpress/templates/: field_report.md, letter_to_self.md, dossier_entry.md, notebook_excerpt.md, ascii_art_piece.md; each renders to a RichPost when passed the template's variable set"
  - "Templates are Jinja-free — plain markdown with {{placeholder}} token substitution; tokens are escape-safe (replaced literally, not interpolated as markdown)"
  - "Every template produces a RichPost that passes preflight with zero errors when fed its canonical example variables; each template has a tests/integrations/wordpress/test_templates_render.py golden-file fixture"

  # ── citations ──
  - "citations.py resolves memory_citations[] (list of {memory_id, tier, label}) to inline anchors: each citation in the body renders as <a class='pn-citation' data-tier='…' data-id='…' href='/dashboard/synapse?row=…'>…</a>"
  - "Citations that reference a burned/expired memory id render as disabled anchors with a visible strike and a tooltip noting 'memory retired' — publishing a post with a stale citation emits a preflight warning (not an error), because memories may retire after publish"
  - "Citations count per post is capped at 20; excess raises a preflight error"

  # ── tool surface ──
  - "wordpress_compose tool invocation signature: compose_post(template_name: str, variables: dict, overrides?: dict) -> RichPost; the tool is registered at trust tier T1 (same as wordpress_publish)"
  - "wordpress_upload_media tool invocation signature: upload_media(local_path_or_vault_path: str, alt: str, caption?: str, credit?: str) -> PublishedMedia; registered at trust tier T1"
  - "Both tools Warden-scan every string argument before network / filesystem interaction; BLOCK verdicts abort the tool cleanly with a ToolError the agent can reason over"

  # ── handler preview ──
  - "The frontend port's blog.json stub (spec 1187) includes at least three RichPost fixtures exercising: (1) hero + inline figures with captions, (2) a pullquote + phosphor callout + memory citation, (3) an inline SVG art piece; each fixture round-trips through markdown_to_html and renders in the handler preview without errors"

invariants:
  - name: preflight_gates_publish
    description: "publish(RichPost) never makes a network call if preflight returns any error-severity issue"
    kind: precondition
    expression: "preflight(post).errors == [] OR publish() returns PreflightFailed AND no HTTP request is made"
    severity: critical

  - name: sanitiser_is_total
    description: "Every HTML output path runs through the allowlist sanitiser; no code path emits raw markdown-to-HTML output to WP"
    kind: state_invariant
    expression: "every callsite passing HTML to WordPressClient.publish goes through sanitise_html()"
    severity: critical

  - name: media_uploaded_before_post
    description: "A post that references a MediaRef never reaches WP before the referenced media has a wp_media_id"
    kind: precondition
    expression: "for every media_ref in post: media_ref.published.wp_media_id is not None BEFORE publish(post)"
    severity: critical

  - name: citations_resolve_or_fail
    description: "Citations referencing a non-existent memory_id raise a preflight error; they never render as silently-dead links"
    kind: precondition
    expression: "for every citation: EpisodicMemoryStore.get(id) is not None OR preflight.errors contains 'unresolved_citation'"
    severity: critical

  - name: dialect_round_trips
    description: "The markdown dialect parser + stringifier are inverses for any RichPost produced by the compose tool"
    kind: postcondition
    expression: "for every RichPost p emitted by compose_post(...): parse(stringify(p)) == p"
    severity: high

  - name: media_dedupe_by_hash
    description: "Uploading the same bytes twice produces one WP media row, not two"
    kind: postcondition
    expression: "upload_media(x); upload_media(x) => wp_media_count() == 1"
    severity: high

  - name: converter_is_pure
    description: "markdown_to_html makes no network call, reads no filesystem, consults no env var; same input yields byte-identical output"
    kind: state_invariant
    expression: "convert(x) == convert(x) AND no I/O side-effects"
    severity: critical

  - name: svg_sanitised_like_1187
    description: "Inline SVGs in posts are sanitised with the same ruleset as spec 1187's asset guard — no <script>, no event handlers, no external references"
    kind: state_invariant
    expression: "for every inline SVG in output: contains no <script|onload=|onclick=|onerror=|xlink:href to external URL"
    severity: critical

  - name: external_links_carry_rel_noopener
    description: "Every <a> targeting an external origin in output HTML carries rel='noopener noreferrer nofollow'"
    kind: state_invariant
    expression: "for every external <a> in output: rel contains {'noopener', 'noreferrer', 'nofollow'}"
    severity: high

  - name: template_tokens_escape_safe
    description: "Template variable substitution replaces tokens as literal text; a variable value of '{{ other }}' is not re-expanded"
    kind: postcondition
    expression: "render(template, {'x': '{{ y }}'}) does not recursively expand '{{ y }}'"
    severity: high
