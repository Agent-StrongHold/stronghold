name: Prompt Sync

on:
  push:
    branches: [main, staging]
    paths:
      - 'agents/**/*.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install httpx pyyaml
      - name: Sync prompts
        env:
          STRONGHOLD_URL: ${{ secrets.STRONGHOLD_URL }}
          STRONGHOLD_API_KEY: ${{ secrets.STRONGHOLD_API_KEY }}
          SYNC_LABEL: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
        run: python scripts/sync_prompts.py
