name: Release

# Tier 4: PR to main — 95% coverage + build + blue-green deploy
# Override: admin can merge without 95% by adding "coverage-override" label

on:
  pull_request:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # never cancel a release in progress

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history for diff against base branch

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Compute changed Python files
        id: changed
        run: |
          if [ -n "${GITHUB_BASE_REF}" ]; then
            git fetch origin "${GITHUB_BASE_REF}" --depth=50
            BASE="origin/${GITHUB_BASE_REF}"
          else
            BASE="HEAD~1"
          fi
          CHANGED=$(git diff --name-only --diff-filter=ACMR "$BASE" -- 'src/stronghold/**/*.py' | tr '\n' ' ')
          echo "files=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Changed Python files: $CHANGED"

      - name: Ruff check (changed files only)
        if: steps.changed.outputs.files != ''
        run: ruff check ${{ steps.changed.outputs.files }}

      - name: Ruff format (changed files only)
        if: steps.changed.outputs.files != ''
        run: ruff format --check ${{ steps.changed.outputs.files }}

      - name: Mypy strict (changed files only)
        if: steps.changed.outputs.files != ''
        run: mypy ${{ steps.changed.outputs.files }} --strict

      - name: Bandit security scan (changed files only)
        if: steps.changed.outputs.files != ''
        run: bandit ${{ steps.changed.outputs.files }} -ll -q

      - name: No-op (no Python changes)
        if: steps.changed.outputs.files == ''
        run: echo "No Python files changed in this PR — skipping lint."

  test:
    name: Full Test Suite (95% coverage)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: stronghold
          POSTGRES_PASSWORD: stronghold
          POSTGRES_DB: stronghold
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stronghold"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://stronghold:stronghold@localhost:5432/stronghold
      ROUTER_API_KEY: sk-ci-test-key-minimum-32-characters
      LITELLM_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run all migrations
        run: |
          for f in migrations/*.sql; do
            echo "Running $f..."
            psql "$DATABASE_URL" -f "$f"
          done

      - name: Full test suite with 95% coverage
        if: "!contains(github.event.pull_request.labels.*.name, 'coverage-override')"
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/performance \
            -m "not perf" \
            --cov=stronghold \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=95

      - name: Full test suite (coverage override)
        if: contains(github.event.pull_request.labels.*.name, 'coverage-override')
        run: |
          echo "⚠️  Coverage override label detected — running without coverage gate"
          pytest tests/ -v --tb=short \
            --ignore=tests/performance \
            -m "not perf" \
            --cov=stronghold \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=0

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-coverage
          path: coverage.xml
