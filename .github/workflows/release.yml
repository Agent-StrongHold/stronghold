name: Release Gate
on:
  push:
    tags: ['v*']

jobs:
  release-gate:
    name: Release Coverage Gate
    runs-on: [self-hosted, stronghold]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: "Coverage gate (100% accountable lines)"
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/e2e \
            --ignore=tests/performance \
            -m "not perf and not e2e" \
            --cov=stronghold \
            --cov-report=term-missing \
            --cov-fail-under=100
      - name: "Verify no bare pragma:no-cover"
        run: |
          if grep -rn 'pragma: no cover' src/stronghold/ | grep -v '# reason:' | grep -v '.pyc'; then
            echo "::error::Found pragma:no-cover without reason annotation"
            exit 1
          fi
