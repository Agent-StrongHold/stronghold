name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src/stronghold/

      - name: Ruff format
        run: ruff format --check src/stronghold/

      - name: Mypy strict
        run: mypy src/stronghold/ --strict

      - name: Bandit security scan
        run: bandit -r src/stronghold/ -ll -q

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: stronghold
          POSTGRES_PASSWORD: stronghold
          POSTGRES_DB: stronghold
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stronghold"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://stronghold:stronghold@localhost:5432/stronghold
      ROUTER_API_KEY: sk-ci-test-key-minimum-32-characters
      LITELLM_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run all migrations
        run: |
          for f in migrations/*.sql; do
            echo "Running $f..."
            psql "$DATABASE_URL" -f "$f"
          done

      - name: Pytest with coverage
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/e2e \
            --ignore=tests/performance \
            -m "not perf and not e2e" \
            --cov=stronghold \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=90

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
